# herdr configuration
# Keep the feel close to home_config/.tmux.conf + .tmux/screen-keys.conf
# (GNU screen-like bindings, prefix ctrl+t).

onboarding = false

[keys]
prefix = "ctrl+t"

detach = "prefix+ctrl+d"  # tmux used bare Ctrl-d; herdr detach always needs prefix
reload_config = "prefix+shift+r"

new_tab = "prefix+c"
rename_tab = "prefix+t"
previous_tab = "prefix+p"
next_tab = "prefix+n"
close_tab = "prefix+shift+x"

split_vertical = "prefix+v"    # like tmux `|` / `v`: side-by-side panes
split_horizontal = "prefix+s"  # like tmux `-` / `s`: stacked panes
close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+r"

cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

# tmux session-like: workspaces group multiple tabs/panes
new_workspace = "prefix+shift+n"
previous_workspace = "prefix+shift+p"
next_workspace = "prefix+shift+o"
workspace_picker = "prefix+w"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+d"
toggle_sidebar = "prefix+b"

[ui]
pane_borders = true
pane_gaps = false
# tmux showed session/window name in the status bar; herdr's sidebar is the
# equivalent always-on-screen place for that, so keep it visible and roomy
# enough for names instead of trying to recreate a status-bar string.
sidebar_width = 30
show_agent_labels_on_pane_borders = true
accent = "blue"  # tmux used blue to highlight the active window
